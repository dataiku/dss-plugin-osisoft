<link rel="stylesheet" href="/plugins/pi-system/resource/pi-system_af-explorer.css">
<div ng-controller="AfExplorerFormCtrl" ng-init="init()" style="margin: 10px 0px;">
    <div class="pi-system-explorer__authentication">
        <div class="pi-system-explorer__authentication-header" ng-click="toggleAuthSection()">
            <strong>Welcome to Pi System Plugin</strong>
        </div>
       <div class="pi-system-explorer__authentication-body" ng-show="authSectionVisible">
        <div class="control-group">
            <label class="control-label" for="pi-system-credentials">Pi System connection</label>
            <div class="dib">
                <div autoconfig-preset-element
                    param-desc="paramDesc"
                    model="config.credentials"
                    plugin-id="pi-system"
                    accessible-parameter-set-descriptions="accessibleParameterSetDescriptions"
                    accessible-presets="accessiblePresets"
                    inline-params="inlineParams"
                    inline-plugin-params="inlinePluginParams"
                    error-scope="errorScope"
                    required>
                </div>
            </div>
        </div>
        <div class="control-group removed-if-manual-query" ng-if="config.credentials && config.credentials.mode && config.credentials.mode!=='NONE' && config.credentials.name">
        <label class="control-label">Server</label>
        <div class="controls">
            <select dku-bs-select
                    ng-model="config.server_name"
                    ng-options="sv.value as sv.label for sv in server_name"
                    ng-init="getServers()"
            > 
            </select>
        </div>
        </div>
        <div class="control-group removed-if-manual-query" ng-if="config.server_name">
            <label class="control-label">Database</label>
            <div class="controls">
                <select dku-bs-select
                        ng-model="config.database_name"
                        ng-change="initializeTree()"
                        ng-options="dbn.value as dbn.label for dbn in database_name"
                        ng-init="getDatabases()"> 
                </select>
            </div>
            <div>
                <input type="checkbox" ng-model="config.use_ssl"> Use SSL
            </div>
        </div>
                   
        <button ng-click="explore()" class="btn btn--secondary link-like"
            id="load-tree-data">Explore
        </button>
    </div>
   </div>
       <div class="control-group removed-if-manual-query"  ng-show="false" ng-if="config.database_name">
       <label class="control-label">Tree</label>
       <div class="controls">
           <select dku-bs-select
                   ng-model="config.treeData"
                   ng-options="dbn.value as dbn.label for dbn in [config.treeData]"
                   ng-init="initializeTree();"> 
           </select>
       </div>

   </div>
    <div class="pi-system-explorer__main" ng-if="showTreeData">
        <div ng-if="config.database_name" ng-init="initializeTree()" class="pi-system-explorer__tree-view">
            <div><strong>Elements</strong></div>
            <div style="margin-bottom:8px;">
                <input id="ReturnsName" ng-model="config.element_name" type="text" data-container="body" data-html="true"
                    data-placement="right" data-toggle="tooltip" title="blaa" placeholder="Search element" />
                <select dku-bs-select
                        ng-model="config.template"
                        ng-options="dbn.title as dbn.title for dbn in config.templates"
                        ng-init="getTemplatesFromDB()">
                </select>
                <select dku-bs-select
                            ng-model="config.element_category"
                            ng-options="dbn.title as dbn.title for dbn in config.element_categories"
                            ng-init="getCategoriesFromDB()">
                    </select>
                <button ng-click="doSearch(config.element_name, config.attribute_name)" class="btn btn--secondary link-like"
                    id="get-query-dim-prop">Search</button>
            </div>

            <ul ng-if="config.treeData.length">
                <li ng-repeat="node in config.treeData track by node.id">
                    <tree-node node="node"></tree-node>
                </li>
            </ul>
        </div>
    
        <!-- Attributes Section -->
        <div class="attribute-tab pi-system-explorer__center-view">
            <div><strong>Attributes</strong></div>
            <div style="margin-bottom:8px;">
                <input id="ReturnsType" list="datatypes" ng-model="config.attribute_name" type="text" data-container="body"
                    data-html="true" data-placement="right" data-toggle="tooltip" title="" placeholder="Search attribute" />
                    <select dku-bs-select
                            ng-model="config.attribute_category"
                            ng-options="dbn.title as dbn.title for dbn in config.attribute_categories"
                            ng-init="getCategoriesFromDB()">
                    </select>
                <button ng-click="doSearch(config.element_name, config.attribute_name)" class="btn btn--secondary link-like"
                    id="get-query-dim-prop">Search</button>
            </div>
            <table>
                <tr ng-repeat="attribute in config.attributeList track by $index">
                    <td>
                        <input type="checkbox" ng-model="attribute.checked" ng-change="updateAttributeToOutput(attribute)">
                    </td>
                    <td>{{attribute.title}}</td>
                    <td>{{attribute.path}}</td>
                </tr>
            </table>
        </div>
    
    </div>


</div>
