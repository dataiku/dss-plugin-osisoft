<div ng-controller="AfExplorerFormController" ng-init="init()" style="margin: 10px 0px;">
    <div class="control-group">
        <label class="control-label" for="pi-system-credentials">Pi System connection</label>
        <div class="dib">
            <div autoconfig-preset-element
                param-desc="paramDesc"
                model="config.credentials"
                plugin-id="pi-system"
                accessible-parameter-set-descriptions="accessibleParameterSetDescriptions"
                accessible-presets="accessiblePresets"
                inline-params="inlineParams"
                inline-plugin-params="inlinePluginParams"
                error-scope="errorScope"
                required>
            </div>
        </div>
    </div>
    <div class="control-group removed-if-manual-query" ng-if="config.credentials && config.credentials.mode && config.credentials.mode!=='NONE' && config.credentials.name">
       <label class="control-label">Server</label>
       <div class="controls">
           <select dku-bs-select
                   ng-model="config.server_name"
                   ng-options="sv.value as sv.label for sv in server_name"
                   ng-init="getServers()"
           > 
           </select>
       </div>
   </div>
   <div class="control-group removed-if-manual-query" ng-if="config.server_name">
       <label class="control-label">Database</label>
       <div class="controls">
           <select dku-bs-select
                   ng-model="config.database_name"
                   ng-change="initializeTree()"
                   ng-options="dbn.value as dbn.label for dbn in database_name"
                   ng-init="getDatabases()"> 
           </select>
       </div>
   </div>
</div>

<div ng-controller="TreeCtrl">
    <input id="ReturnsName" ng-model="config.element_name" type="text" data-container="body" data-html="true" data-placement="right" data-toggle="tooltip"
                      title="blaa" placeholder="Element name search..."/>
    <input id="ReturnsType" list="datatypes" ng-model="config.attribute_name" type="text" data-container="body" data-html="true" data-placement="right"
        data-toggle="tooltip" title="" placeholder="Attribute name search..." />
    <button ng-click="doSearch(config.element_name, config.attribute_name)" class="btn btn--primary link-like" id="get-query-dim-prop">Search...</button>
  <ul ng-if="treeData.length">
    <li ng-repeat="node in treeData track by node.id">
      <tree-node node="node"></tree-node>
    </li>
  </ul>
</div>
